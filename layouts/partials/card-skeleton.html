{{- /* Loading-skeleton overlay for a post card: rounded shape placeholders shown only
       while .grid.is-loading. The thumbnail is hidden on text-only cards via CSS. */ -}}
<div class="card-skeleton" aria-hidden="true">
	<span class="sk-bar sk-title"></span>
	<span class="sk-thumb"></span>
	<span class="sk-bar"></span>
	<span class="sk-bar sk-short"></span>
</div>
